<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://db.onlinewebfonts.com; font-src 'self' https://fonts.gstatic.com https://db.onlinewebfonts.com; img-src 'self' data:; connect-src 'self' ws://localhost:3001 http://localhost:3001 http://localhost:11434 https://wmmyiyjxunxzijgqzksk.supabase.co https://api.enkryptai.com; media-src 'self' https://d8j0ntlcm91z4.cloudfront.net;">
  <title>Nexus Meeting Intelligence</title>
  <script>
    if (!window.synapse) {
      console.log('Injecting mock window.synapse for standard browser context');
      window.synapse = {
        meetings: {
          list: async () => {
            const list = localStorage.getItem('mock_meetings') || '[]';
            return JSON.parse(list);
          },
          get: async (id) => {
            const list = JSON.parse(localStorage.getItem('mock_meetings') || '[]');
            const meeting = list.find(m => m.id === id);
            if (!meeting) throw new Error('Meeting not found');
            const actionItems = JSON.parse(localStorage.getItem('mock_action_items') || '[]').filter(item => item.meetingId === id);
            return { meeting, actionItems, executionPlan: { enkryptValidationScore: 0.95 } };
          },
          approve: async (id, updates) => {
            const actionItems = JSON.parse(localStorage.getItem('mock_action_items') || '[]');
            const idx = actionItems.findIndex(item => item.id === id);
            if (idx !== -1) {
              actionItems[idx] = { ...actionItems[idx], ...updates };
              if (updates.status) {
                actionItems[idx].status = updates.status === 'validated' ? 'APPROVED' : updates.status.toUpperCase();
              }
              localStorage.setItem('mock_action_items', JSON.stringify(actionItems));
            }
            return { success: true };
          },
          delete: async (id) => {
            let list = JSON.parse(localStorage.getItem('mock_meetings') || '[]');
            list = list.filter(m => m.id !== id);
            localStorage.setItem('mock_meetings', JSON.stringify(list));
            return { success: true };
          }
        },
        ingest: {
          upload: async (filePath) => {
            console.log('Mock uploading file:', filePath);
            return { success: true };
          },
          uploadBuffer: async (buffer) => {
            console.log('Mock uploading buffer');
            return { success: true, transcript: 'Mock transcript from buffer' };
          },
          onProgress: (callback) => {
            setTimeout(() => callback(null, { progress: 20, stage: 'transcribe', message: 'Deepgram transcription in progress...' }), 100);
            setTimeout(() => callback(null, { progress: 50, stage: 'extract', message: 'Extracting decisions and action items...' }), 300);
            setTimeout(() => callback(null, { progress: 80, stage: 'validate', message: 'Validating commitments...' }), 500);
            setTimeout(() => callback(null, { progress: 100, stage: 'Complete', message: 'Pipeline complete!' }), 700);
            return () => {};
          },
          onAutocapStart: (callback) => () => {},
          onAutocapStop: (callback) => () => {}
        },
        memory: {
          search: async (query) => [],
          ask: async (question) => ({ answer: 'This is a mock response to: ' + question })
        },
        settings: {
          get: async () => ({ enableLocalCache: true }),
          update: async (settings) => settings,
          ollamaStatus: async () => ({ active: true }),
          ollamaPull: async (model) => ({ success: true }),
          getAutocapture: async () => ({ enabled: false }),
          updateAutocapture: async (settings) => settings
        },
        auth: {
          getSession: async () => {
            const user = localStorage.getItem('mock_user');
            if (!user) return null;
            return { data: { session: { user: JSON.parse(user) } } };
          },
          signIn: async (creds) => {
            console.log('Mock signing in user:', creds.email);
            const user = { id: 'mock-user-123', email: creds.email, user_metadata: { full_name: creds.email.split('@')[0] } };
            localStorage.setItem('mock_user', JSON.stringify(user));
            return { user, session: { access_token: 'mock-jwt-token' } };
          },
          signUp: async (creds) => {
            const user = { id: 'mock-user-123', email: creds.email, user_metadata: { full_name: creds.email.split('@')[0] } };
            localStorage.setItem('mock_user', JSON.stringify(user));
            return { user, session: { access_token: 'mock-jwt-token' } };
          },
          signOut: async () => {
            localStorage.removeItem('mock_user');
            return { success: true };
          }
        },
        system: {
          health: async () => ({ healthy: true }),
          dockerStatus: async () => ({ active: true }),
          dockerStart: async () => ({ success: true }),
          dockerStop: async () => ({ success: true }),
          getResources: async () => ({ cpu: 12, ram: 45 })
        },
        native: {
          openFileDialog: async () => 'mock_meeting_audio.mp3',
          showNotification: async (title, body) => console.log('Notification:', title, body),
          revealExplorer: async (path) => console.log('Reveal:', path),
          minimize: async () => {},
          maximize: async () => {}
        },
        workspace: {
          get: async () => ({ id: 'default_workspace', name: 'Default Workspace' }),
          invite: async (data) => ({ success: true })
        }
      };

      // Seed mock meetings if empty, to allow list & detail views to work
      const existingMeetings = localStorage.getItem('mock_meetings');
      if (!existingMeetings) {
        const mockMeetings = [
          {
            id: 'mock-meeting-id-1',
            title: 'Q3 Product Strategy Sync',
            status: 'COMPLETED',
            createdAt: new Date().toISOString(),
            participantNames: ['Alice Smith', 'Bob Jones'],
            transcriptRaw: "Let's align on Q3 launch date. Alice will publish the documentation by Wednesday. Bob will run the security scanning tool before Friday."
          }
        ];
        const mockActionItems = [
          {
            id: 'mock-action-item-id-1',
            meetingId: 'mock-meeting-id-1',
            description: 'Publish documentation by Wednesday',
            assignee: 'Alice Smith',
            status: 'PENDING_APPROVAL',
            dueDate: new Date(Date.now() + 86400000 * 3).toISOString()
          },
          {
            id: 'mock-action-item-id-2',
            meetingId: 'mock-meeting-id-1',
            description: 'Run security scanning tool before Friday',
            assignee: 'Bob Jones',
            status: 'APPROVED',
            dueDate: new Date(Date.now() + 86400000 * 5).toISOString()
          }
        ];
        localStorage.setItem('mock_meetings', JSON.stringify(mockMeetings));
        localStorage.setItem('mock_action_items', JSON.stringify(mockActionItems));
      }
    }
  </script>
  <link rel="stylesheet" href="https://db.onlinewebfonts.com/c/5ac3fe7c6abd2f62067f266d89671492?family=HelveticaNowDisplay-Medium">
  <link rel="stylesheet" href="https://db.onlinewebfonts.com/c/1aa3377e489837a26d019bba501e779d?family=HelveticaNowDisplayW01-Rg">
  <link rel="stylesheet" href="./index.css">
</head>
<body>
  <!-- Custom Title Bar -->
  <div id="title-bar">
    <div class="drag-region">
      <span class="logo"></span>
      <span class="title">NEXUS</span>
    </div>
    <div class="window-controls" style="display: flex; align-items: center;">
      <button id="btn-bg-status" class="control-btn" title="Toggle Background Auto-Capture" style="margin-right: 10px; display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border: none; background: transparent; cursor: pointer; border-radius: 4px; color: var(--muted); -webkit-app-region: no-drag; transition: all 0.2s;">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="radar-icon" style="transition: transform 0.3s ease;"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      </button>
      <button id="btn-minimize" class="control-btn">—</button>
      <button id="btn-maximize" class="control-btn">⬜</button>
      <button id="btn-close" class="control-btn close-btn">✕</button>
    </div>
  </div>

  <div id="app-container">
    <!-- Left Navigation Rail -->
    <nav id="sidebar">
      <div class="nav-links">
        <a href="#dashboard" class="nav-item active" data-page="dashboard">
          <span class="icon"></span> Dashboard
        </a>
        <a href="#upload" class="nav-item" data-page="upload">
          <span class="icon"></span> Ingest Meeting
        </a>
        <a href="#court" class="nav-item" data-page="court">
          <span class="icon"></span> Commitment Court
        </a>
        <a href="#blockers" class="nav-item" data-page="blockers">
          <span class="icon"></span> Blocker Web
        </a>
        <a href="#ask" class="nav-item" data-page="ask">
          <span class="icon"></span> Ask Nexus
        </a>
        <a href="#workspace" class="nav-item" data-page="workspace">
          <span class="icon"></span> Workspace
        </a>
        <a href="#settings" class="nav-item" data-page="settings">
          <span class="icon"></span> Settings
        </a>
      </div>
      <div class="sidebar-footer">
        <div class="resource-indicator">
          <span>CPU: <strong id="cpu-load">0%</strong></span>
          <span>RAM: <strong id="ram-load">0%</strong></span>
        </div>
        <div class="system-status">
          <span class="status-dot online"></span>
          <span class="status-text">Ollama Active</span>
        </div>
        <div class="profile-section" style="display: flex; flex-direction: column; gap: 10px; margin-top: 16px; border-top: 1px solid var(--hairline); padding-top: 16px;">
          <div style="display: flex; align-items: center; gap: 10px;">
            <div id="profile-avatar" style="width: 32px; height: 32px; border-radius: 50%; background: #cc785c; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px;">U</div>
            <div style="display: flex; flex-direction: column; min-width: 0;">
              <span id="profile-name" style="font-size: 13px; font-weight: 600; color: var(--ink);">User</span>
              <span id="profile-email" style="font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">User Email</span>
            </div>
          </div>
          <button id="btn-logout" style="background: var(--surface-soft); border: 1px solid var(--hairline); color: #c64545; cursor: pointer; font-size: 12px; font-weight: 600; padding: 8px 12px; border-radius: 6px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s;">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Logout
          </button>
        </div>
      </div>
    </nav>

    <!-- Main Content Work Area -->
    <main id="content">
      <!-- Pages will be injected here dynamically -->
    </main>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
